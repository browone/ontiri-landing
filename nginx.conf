server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/html text/css text/plain application/javascript;
    gzip_min_length 256;

    location / {
        try_files $uri /index.html;
        add_header Cache-Control "public, max-age=3600";
    }
}
